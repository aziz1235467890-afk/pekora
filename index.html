<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Pekora</title>

<style>
body{
  margin:0;
  font-family: Arial;
  text-align:center;
  color:white;
  background: linear-gradient(135deg, #2b0a3d, #0f3d2e);
  overflow:hidden;
}

/* خلفية النجوم */
#stars{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* صندوق اللعبة */
.box{
  background: rgba(0,0,0,0.6);
  width:320px;
  margin:auto;
  margin-top:80px;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 15px #000;
}

/* أزرار */
button{
  padding:10px 15px;
  margin:8px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.green{ background:#00ff88; color:black; }
.purple{ background:#a855f7; color:white; }

input{
  padding:10px;
  width:80%;
  border-radius:8px;
  border:none;
  margin-top:10px;
}

/* الحقوق */
footer{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:rgba(0,0,0,0.6);
  color:#aaa;
  text-align:center;
  padding:8px;
  font-size:12px;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<h1>🎮 Pekora</h1>

<div class="box">
  <p>🎯 خمن الرقم بين 1 و 10</p>

  <input type="number" id="guess">

  <br>

  <button class="green" onclick="check()">خمن</button>
  <button class="purple" onclick="resetGame()">إعادة</button>

  <p id="msg"></p>
</div>

<footer>
© 2026 Pekora Game - صنع بواسطة aziz/sptmbr
</footer>

<script>
/* اللعبة */
let num = rand();

function rand(){
  return Math.floor(Math.random()*10)+1;
}

function check(){
  let g = document.getElementById("guess").value;

  if(g == num){
    document.getElementById("msg").innerText = "🔥 صح!";
    num = rand();
  }else{
    document.getElementById("msg").innerText = "❌ خطأ";
  }
}

function resetGame(){
  num = rand();
  document.getElementById("msg").innerText = "🔁 لعبة جديدة";
}

/* النجوم */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<150;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    speed: Math.random()*1+0.2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";

  for(let s of stars){
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();

    s.y += s.speed;

    if(s.y > canvas.height){
      s.y = 0;
      s.x = Math.random()*canvas.width;
    }
  }

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
