<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Pekora Game</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'MedievalSharp','Cinzel',serif;
  text-align:center;
  color:white;
  background: radial-gradient(circle at top, #2b0a3d, #0f3d2e);
  overflow:hidden;
}

#stars{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

@keyframes pop{
  0%{transform:scale(0.7);opacity:0;}
  80%{transform:scale(1.05);opacity:1;}
  100%{transform:scale(1);}
}

h1{
  margin-top:25px;
  font-size:44px;
  color:#9146ff;
  text-shadow:0 0 10px #9146ff,0 0 25px #00ff88;
  animation:pop 0.6s ease;
}

.box{
  background:#18181b;
  width:360px;
  margin:auto;
  margin-top:20px;
  padding:20px;
  border-radius:12px;
  border:1px solid #2a2a2d;
  animation:pop 0.4s ease;
}

input{
  padding:10px;
  width:85%;
  border-radius:8px;
  border:none;
  margin-top:10px;
  background:#0e0e10;
  color:white;
}

button{
  padding:10px 14px;
  margin:6px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

button:active{transform:scale(0.9);}

.green{background:#00ff88;color:black;}
.purple{background:#9146ff;color:white;}
.blue{background:#2d8cff;color:white;}

footer{
  position:fixed;
  bottom:0;
  width:100%;
  font-size:12px;
  color:#aaa;
  background:#0e0e10;
  padding:8px;
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<h1>🎮 Pekora Game</h1>

<div class="box">

  <p>👤 اللاعب: <span id="name"></span></p>
  <p>🏆 Level: <span id="level">1</span></p>
  <p>💰 Coins: <span id="coins">0</span></p>

  <input type="number" id="guess">

  <br>

  <button class="green" onclick="clickSound(); check()">خمن</button>
  <button class="purple" onclick="clickSound(); hint()">💡 تلميح (-3)</button>

  <p id="msg"></p>

  <hr>

  <button class="blue" onclick="clickSound(); buy(3)">🛒 شراء (3)</button>

</div>

<footer>
©️ 2026 Pekora - aziz/sptmbr
</footer>

<script>

////////////////////////
// 🔊 نظام الأصوات
////////////////////////

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq, duration, type){
  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.type = type || "sine";
  osc.frequency.value = freq;

  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);

  osc.start();
  osc.stop(audioCtx.currentTime + duration/1000);
}

function winSound(){
  beep(600,150);
  setTimeout(()=>beep(800,150),150);
}

function loseSound(){
  beep(200,300,"square");
}

function buySound(){
  beep(500,100);
  setTimeout(()=>beep(700,100),100);
}

function clickSound(){
  beep(300,80);
}

////////////////////////
// 🎮 اللعبة
////////////////////////

let playerName = localStorage.getItem("name") || "Player";
document.getElementById("name").innerText = playerName;

let coins = parseInt(localStorage.getItem("coins")) || 0;
let level = parseInt(localStorage.getItem("level")) || 1;

let num = rand();

updateUI();

function rand(){
  return Math.floor(Math.random()*10)+1;
}

function check(){
  let g = document.getElementById("guess").value;

  if(g == num){
    coins += 1;
    document.getElementById("msg").innerText = "🔥 صح +1";
    winSound();
    num = rand();
  } else {
    document.getElementById("msg").innerText = "❌ خطأ";
    loseSound();
  }

  save();
  updateUI();
}

function hint(){
  if(coins >= 3){
    coins -= 3;
    document.getElementById("msg").innerText = "💡 قريب من " + num;
    clickSound();
  }
  save();
  updateUI();
}

function buy(cost){
  if(coins >= cost){
    coins -= cost;
    buySound();
    alert("تم الشراء!");
  } else {
    loseSound();
    alert("❌ ما عندك كفاية");
  }

  save();
  updateUI();
}

function save(){
  localStorage.setItem("coins", coins);
  localStorage.setItem("level", level);
}

function updateUI(){
  document.getElementById("coins").innerText = coins;
  document.getElementById("level").innerText = level;
}

/* 🌌 نجوم */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<120;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    speed: Math.random()*1+0.2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";

  for(let s of stars){
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();

    s.y += s.speed;

    if(s.y > canvas.height){
      s.y = 0;
      s.x = Math.random()*canvas.width;
    }
  }

  requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
