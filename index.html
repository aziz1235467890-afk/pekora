<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Pekora Game</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'MedievalSharp', cursive;
  text-align:center;
  color:white;
  background: radial-gradient(circle at top, #2b0a3d, #0f3d2e);
  overflow:hidden;
}

h1{
  margin-top:25px;
  color:#9146ff;
  text-shadow:0 0 10px #9146ff;
}

.box{
  background:#18181b;
  width:360px;
  margin:auto;
  margin-top:20px;
  padding:20px;
  border-radius:12px;
}

/* 📦 أقسام */
.section{
  background:#0e0e10;
  margin-top:15px;
  padding:10px;
  border-radius:10px;
}

/* 🔘 أزرار */
button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.green{background:#00ff88;}
.purple{background:#9146ff;color:white;}
.blue{background:#2d8cff;color:white;}

input{
  padding:10px;
  width:80%;
  border-radius:8px;
  border:none;
  margin-top:10px;
}

footer{
  position:fixed;
  bottom:0;
  width:100%;
  font-size:12px;
  color:#aaa;
  background:#0e0e10;
  padding:8px;
}

</style>
</head>

<body>

<h1>🎮 Pekora Game</h1>

<div class="box">

  <p>👤 اللاعب: <span id="name"></span></p>
  <p>🏆 Level: <span id="level"></span></p>
  <p>💰 Coins: <span id="coins"></span></p>

  <!-- 🎯 سؤال واضح -->
  <p id="range">🎯 خمن الرقم من 1 - 10</p>

  <input type="number" id="guess">

  <br>

  <button class="green" onclick="check()">خمن</button>
  <button class="purple" onclick="hint()">💡 تلميح (-3)</button>

  <p id="msg"></p>

  <!-- 🛒 متجر -->
  <div class="section">
    <h3>🛒 المتجر</h3>
    <button class="blue" onclick="buy(3)">💡 تلميح إضافي (3)</button>
    <button class="blue" onclick="buy(5)">❤️ حياة (5)</button>
  </div>

  <!-- 🏆 Leaderboard -->
  <div class="section">
    <h3>🏆 Leaderboard</h3>
    <div id="board"></div>
  </div>

</div>

<footer>
©️ 2026 Pekora - aziz/sptmbr
</footer>

<script>

/* 👤 اسم اللاعب */
let playerName = localStorage.getItem("name") || "Player";
document.getElementById("name").innerText = playerName;

/* 💾 بيانات */
let coins = parseInt(localStorage.getItem("coins")) || 0;
let level = parseInt(localStorage.getItem("level")) || 1;

let num = rand();

/* 🎯 نطاق */
function getMax(){
  if(level <= 3) return 10;
  if(level <= 6) return 20;
  return 50;
}

function updateRange(){
  document.getElementById("range").innerText =
  "🎯 خمن الرقم من 1 - " + getMax();
}

updateRange();

function rand(){
  return Math.floor(Math.random()*getMax())+1;
}

/* 🎮 لعب */
function check(){
  let g = document.getElementById("guess").value;

  if(g == num){
    coins += 1;
    document.getElementById("msg").innerText = "🔥 صح +1";
    num = rand();
  } else {
    document.getElementById("msg").innerText = "❌ خطأ";
  }

  save();
  saveScore();
  updateUI();
}

/* 💡 تلميح */
function hint(){
  if(coins >= 3){
    coins -= 3;
    document.getElementById("msg").innerText = "💡 قريب من " + num;
  }
  save();
  updateUI();
}

/* 🛒 شراء */
function buy(cost){
  if(coins >= cost){
    coins -= cost;
    alert("تم الشراء!");
  } else {
    alert("❌ ما عندك كفاية");
  }
  save();
  updateUI();
}

/* 💾 حفظ */
function save(){
  localStorage.setItem("coins", coins);
  localStorage.setItem("level", level);
}

/* 🏆 Leaderboard */
function saveScore(){

  let board = JSON.parse(localStorage.getItem("leaderboard")) || [];

  let found = board.find(p => p.name === playerName);

  if(found){
    found.coins = coins;
  } else {
    board.push({name:playerName, coins:coins});
  }

  board.sort((a,b)=> b.coins - a.coins);

  localStorage.setItem("leaderboard", JSON.stringify(board));

  render(board);
}

function render(board){
  let html = "";
  board.slice(0,5).forEach((p,i)=>{
    html += `<p>${i+1}. ${p.name} - 💰 ${p.coins}</p>`;
  });

  document.getElementById("board").innerHTML = html;
}

/* 📊 UI */
function updateUI(){
  document.getElementById("coins").innerText = coins;
  document.getElementById("level").innerText = level;
  updateRange();
}

updateUI();

</script>

</body>
</html>
