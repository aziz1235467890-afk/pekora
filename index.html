<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Pekora</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'MedievalSharp', cursive;
  text-align:center;
  color:white;
  background: radial-gradient(circle at top, #2b0a3d, #0f3d2e);
  overflow:hidden;
}

#stars{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

@keyframes popIn{
  0%{transform:scale(0.7);opacity:0;}
  80%{transform:scale(1.05);opacity:1;}
  100%{transform:scale(1);}
}

h1{
  margin-top:30px;
  font-size:44px;
  color:#9146ff;
  text-shadow:0 0 10px #9146ff,0 0 25px #00ff88;
  animation:popIn 0.6s ease-out;
}

.box{
  background:#18181b;
  width:340px;
  margin:auto;
  margin-top:30px;
  padding:20px;
  border-radius:12px;
  border:1px solid #2a2a2d;
  animation:popIn 0.4s ease-out;
}

input{
  padding:10px;
  width:85%;
  border-radius:8px;
  border:none;
  margin-top:10px;
  background:#0e0e10;
  color:white;
  outline:none;
}

button{
  padding:10px 14px;
  margin:6px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

button:active{transform:scale(0.9);}

.green{background:#00ff88;color:black;}
.purple{background:#9146ff;color:white;}
.blue{background:#2d8cff;color:white;}

footer{
  position:fixed;
  bottom:0;
  width:100%;
  text-align:center;
  font-size:12px;
  color:#aaa;
  background:#0e0e10;
  padding:8px;
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<h1>🎮 Pekora</h1>

<div class="box">

  <p>🏆 Level: <span id="level">1</span></p>
  <p>💰 Coins: <span id="coins">0</span></p>
  <p>🔥 Streak: <span id="streak">0</span></p>

  <input type="number" id="guess">

  <br>

  <button class="green" onclick="check(); play('win')">خمن</button>
  <button class="purple" onclick="hint(); play('click')">💡 تلميح</button>
  <button class="blue" onclick="shop(); play('click')">🛒 المتجر</button>

  <p id="msg"></p>

  <button onclick="daily()">🎁 مكافأة يومية</button>

</div>

<footer>
©️ 2026 Pekora Game - aziz/sptmbr
</footer>

<!-- 🔊 أصوات -->
<audio id="winSound">
  <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3">
</audio>

<audio id="clickSound">
  <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3">
</audio>

<script>

let num = rand();

/* 💾 تحميل بيانات */
let coins = localStorage.getItem("coins") || 0;
let level = localStorage.getItem("level") || 1;
let streak = localStorage.getItem("streak") || 0;

coins = parseInt(coins);
level = parseInt(level);
streak = parseInt(streak);

updateUI();

/* 🎯 رقم */
function rand(){
  return Math.floor(Math.random()*10)+1;
}

/* 🎮 لعب */
function check(){
  let g = document.getElementById("guess").value;

  if(g == num){

    streak++;

    let reward = 1 + Math.floor(level/3);
    coins += reward;

    if(streak % 3 === 0){
      level++;
    }

    document.getElementById("msg").innerText =
    "🔥 صح! +" + reward + " عملات";

    play('win');

    num = rand();

  } else {
    streak = 0;
    document.getElementById("msg").innerText = "❌ خطأ";
  }

  save();
  updateUI();
}

/* 💡 تلميح */
function hint(){
  if(coins >= 3){
    coins -= 3;
    document.getElementById("msg").innerText =
    "💡 قريب من " + num;
  } else {
    document.getElementById("msg").innerText =
    "❌ تحتاج 3 عملات";
  }

  save();
  updateUI();
}

/* 🛒 متجر */
function shop(){
  window.open("shop.html","_blank");
}

/* 🎁 يومي */
function daily(){
  let last = localStorage.getItem("daily");

  let today = new Date().toDateString();

  if(last != today){
    coins += 5;
    localStorage.setItem("daily", today);
    alert("🎁 حصلت 5 عملات!");
  } else {
    alert("رجعت اليوم قبل كذا");
  }

  save();
  updateUI();
}

/* 🔊 أصوات */
function play(type){
  if(type === "win"){
    document.getElementById("winSound").play();
  } else {
    document.getElementById("clickSound").play();
  }
}

/* 💾 حفظ */
function save(){
  localStorage.setItem("coins", coins);
  localStorage.setItem("level", level);
  localStorage.setItem("streak", streak);
}

/* 📊 UI */
function updateUI(){
  document.getElementById("coins").innerText = coins;
  document.getElementById("level").innerText = level;
  document.getElementById("streak").innerText = streak;
}

/* 🌌 نجوم */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<120;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    speed: Math.random()*1+0.2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";

  for(let s of stars){
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();

    s.y += s.speed;

    if(s.y > canvas.height){
      s.y = 0;
      s.x = Math.random()*canvas.width;
    }
  }

  requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
