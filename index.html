<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Pekora Game</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'MedievalSharp', cursive;
  text-align:center;
  color:white;
  background: radial-gradient(circle at top, #2b0a3d, #0f3d2e);
  overflow:hidden;
}

#stars{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

@keyframes pop{
  0%{transform:scale(0.7);opacity:0;}
  80%{transform:scale(1.05);opacity:1;}
  100%{transform:scale(1);}
}

h1{
  margin-top:30px;
  color:#9146ff;
  text-shadow:0 0 10px #9146ff,0 0 20px #00ff88;
  animation:pop 0.6s ease;
}

.box{
  background:#18181b;
  width:340px;
  margin:auto;
  margin-top:20px;
  padding:20px;
  border-radius:12px;
  border:1px solid #2a2a2d;
  animation:pop 0.4s ease;
}

input{
  padding:10px;
  width:85%;
  border-radius:8px;
  border:none;
  margin-top:10px;
  background:#0e0e10;
  color:white;
}

button{
  padding:10px 14px;
  margin:6px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

button:active{transform:scale(0.9);}

.green{background:#00ff88;color:black;}
.purple{background:#9146ff;color:white;}
.blue{background:#2d8cff;color:white;}

.shop{
  margin-top:10px;
  padding:10px;
  background:#111;
  border-radius:10px;
}

footer{
  position:fixed;
  bottom:0;
  width:100%;
  font-size:12px;
  color:#aaa;
  background:#0e0e10;
  padding:8px;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<h1>🎮 Pekora</h1>

<div class="box">

  <p>🎯 خمن رقم من 1 إلى 10</p>

  <p>💰 العملات: <span id="coinsText">0</span></p>

  <input type="number" id="guess">

  <br>

  <button class="green" onclick="check()">خمن</button>
  <button class="purple" onclick="hint()">💡 تلميح (-3)</button>

  <p id="msg"></p>

  <hr>

  <h3>🛒 المتجر</h3>

  <div class="shop">
    <button onclick="buy(3)">💡 تلميح إضافي (3)</button>
    <button onclick="buy(5)">❤️ حياة (5)</button>
  </div>

</div>

<footer>
©️ 2026 Pekora - aziz/sptmbr
</footer>

<script>

/* 💾 تحميل العملات */
let coins = parseInt(localStorage.getItem("coins")) || 0;

let num = rand();
updateUI();

/* 🎯 رقم */
function rand(){
  return Math.floor(Math.random()*10)+1;
}

/* 🎮 لعب */
function check(){
  let g = document.getElementById("guess").value;

  if(g == num){
    coins += 1;
    document.getElementById("msg").innerText = "🔥 صح +1 عملة";
    num = rand();
  } else {
    document.getElementById("msg").innerText = "❌ خطأ";
  }

  save();
  updateUI();
}

/* 💡 تلميح */
function hint(){
  if(coins >= 3){
    coins -= 3;
    document.getElementById("msg").innerText =
    "💡 قريب من " + num;
  } else {
    document.getElementById("msg").innerText =
    "❌ تحتاج 3 عملات";
  }

  save();
  updateUI();
}

/* 🛒 شراء */
function buy(cost){
  if(coins >= cost){
    coins -= cost;
    alert("تم الشراء!");
  } else {
    alert("❌ ما عندك عملات كفاية");
  }

  save();
  updateUI();
}

/* 💾 حفظ */
function save(){
  localStorage.setItem("coins", coins);
}

/* 📊 تحديث */
function updateUI(){
  document.getElementById("coinsText").innerText = coins;
}

/* 🌌 نجوم */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<120;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    speed: Math.random()*1+0.2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";

  for(let s of stars){
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();

    s.y += s.speed;

    if(s.y > canvas.height){
      s.y = 0;
      s.x = Math.random()*canvas.width;
    }
  }

  requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
