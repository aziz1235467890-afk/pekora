<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Pekora</title>

<style>
body{
  margin:0;
  font-family: Arial;
  color:white;
  text-align:center;
  background:#0e0e10;
  overflow:hidden;
}

#stars{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

h1{
  margin-top:40px;
  font-size:42px;
  color:#9146ff;
  text-shadow:0 0 12px #9146ff;
}

.box{
  background:#18181b;
  width:340px;
  margin:auto;
  margin-top:40px;
  padding:25px;
  border-radius:12px;
  border:1px solid #2a2a2d;
}

input{
  padding:12px;
  width:85%;
  border-radius:8px;
  border:none;
  margin-top:10px;
  background:#0e0e10;
  color:white;
  outline:none;
}

button{
  padding:10px 14px;
  margin:6px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
}

.green{background:#00ff88;color:black;}
.purple{background:#9146ff;color:white;}
.blue{background:#2d8cff;color:white;}

footer{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#0e0e10;
  color:#aaa;
  text-align:center;
  padding:8px;
  font-size:12px;
  border-top:1px solid #2a2a2d;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<h1>🎮 Pekora</h1>

<div class="box">
  <p>🎯 خمن الرقم بين 1 و 10</p>

  <input type="number" id="guess">

  <br>

  <button class="green" onclick="check(); playClick()">خمن</button>
  <button class="purple" onclick="hint(); playClick()">💡 تلميح</button>
  <button class="blue" onclick="shop(); playClick()">🛒 المتجر</button>

  <p id="msg"></p>
</div>

<footer>
© 2026 Pekora Game - صنع بواسطة aziz/sptmbr
</footer>

<!-- الصوت -->
<audio id="clickSound">
  <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3" type="audio/mpeg">
</audio>

<script>
let num = rand();

function rand(){
  return Math.floor(Math.random()*10)+1;
}

function check(){
  let g = document.getElementById("guess").value;

  if(g == num){
    document.getElementById("msg").innerText = "🔥 صح!";
    num = rand();
  }else{
    document.getElementById("msg").innerText = "❌ خطأ";
  }
}

function hint(){
  document.getElementById("msg").innerText =
  "💡 الرقم قريب من " + num;
}

function shop(){
  window.open("shop.html","_blank");
}

/* صوت */
function playClick(){
  document.getElementById("clickSound").play();
}

/* نجوم */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<150;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    speed: Math.random()*1+0.3
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";

  for(let s of stars){
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();

    s.y += s.speed;

    if(s.y > canvas.height){
      s.y = 0;
      s.x = Math.random()*canvas.width;
    }
  }

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
