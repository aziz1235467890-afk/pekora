<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Pekora Game</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'MedievalSharp', cursive;
  text-align:center;
  color:white;
  background: radial-gradient(circle at top, #2b0a3d, #0f3d2e);
  overflow:hidden;
}

/* 🌌 نجوم */
#stars{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* 💥 pop */
@keyframes pop{
  0%{transform:scale(0.7);opacity:0;}
  80%{transform:scale(1.05);opacity:1;}
  100%{transform:scale(1);}
}

h1{
  margin-top:25px;
  font-size:44px;
  color:#9146ff;
  text-shadow:0 0 10px #9146ff;
  animation:pop 0.6s ease;
}

.box{
  background:#18181b;
  width:360px;
  margin:auto;
  margin-top:20px;
  padding:20px;
  border-radius:12px;
  border:1px solid #2a2a2d;
  animation:pop 0.4s ease;
}

input{
  padding:10px;
  width:85%;
  border-radius:8px;
  border:none;
  margin-top:10px;
  background:#0e0e10;
  color:white;
}

button{
  padding:10px 14px;
  margin:6px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.green{background:#00ff88;}
.purple{background:#9146ff;color:white;}
.blue{background:#2d8cff;color:white;}

.section{
  margin-top:10px;
  padding:10px;
  background:#0e0e10;
  border-radius:10px;
}

a{
  text-decoration:none;
}

footer{
  position:fixed;
  bottom:0;
  width:100%;
  font-size:12px;
  color:#aaa;
  background:#0e0e10;
  padding:8px;
}

</style>
</head>

<body>

<!-- 🌌 النجوم -->
<canvas id="stars"></canvas>

<h1>🎮 Pekora Game</h1>

<div class="box">

  <p>👤 اللاعب: <span id="name"></span></p>
  <p>🏆 Level: <span id="level"></span></p>
  <p>💰 Coins: <span id="coins"></span></p>

  <!-- 🎯 نطاق -->
  <p id="range">🎯 خمن الرقم من 1 - 10</p>

  <input type="number" id="guess">

  <br>

  <button class="green" onclick="check()">خمن</button>
  <button class="purple" onclick="hint()">💡 تلميح (-3)</button>

  <p id="msg"></p>

  <!-- 🔗 تنقل -->
  <div class="section">

    <button class="blue" onclick="window.location.href='shop.html'">
      🛒 المتجر
    </button>

    <button class="purple" onclick="window.location.href='leaderboard.html'">
      🏆 Leaderboard
    </button>

  </div>

  <!-- 🏆 preview -->
  <div class="section">
    <h3>🏆 Top Players</h3>
    <div id="board"></div>
  </div>

</div>

<footer>
©️ 2026 Pekora - aziz/sptmbr
</footer>

<script>

/* 👤 اسم اللاعب */
let playerName = localStorage.getItem("name") || prompt("اكتب اسمك:");
localStorage.setItem("name", playerName);
document.getElementById("name").innerText = playerName;

/* 💾 بيانات */
let coins = parseInt(localStorage.getItem("coins")) || 0;
let level = parseInt(localStorage.getItem("level")) || 1;

let num = rand();

updateUI();

/* 🎯 صعوبة */
function getMax(){
  if(level <= 3) return 10;
  if(level <= 6) return 20;
  return 50;
}

function updateRange(){
  document.getElementById("range").innerText =
  "🎯 خمن الرقم من 1 - " + getMax();
}

function rand(){
  return Math.floor(Math.random()*getMax())+1;
}

/* 🎮 لعب */
function check(){
  let g = document.getElementById("guess").value;

  if(g == num){
    coins += 1;
    document.getElementById("msg").innerText = "🔥 صح +1";
    num = rand();
  } else {
    document.getElementById("msg").innerText = "❌ خطأ";
  }

  save();
  saveScore();
  updateUI();
}

/* 💡 تلميح */
function hint(){
  if(coins >= 3){
    coins -= 3;
    document.getElementById("msg").innerText = "💡 قريب من " + num;
  }
  save();
  updateUI();
}

/* 💾 حفظ */
function save(){
  localStorage.setItem("coins", coins);
  localStorage.setItem("level", level);
}

/* 🏆 leaderboard */
function saveScore(){

  let board = JSON.parse(localStorage.getItem("leaderboard")) || [];

  let found = board.find(p => p.name === playerName);

  if(found){
    found.coins = coins;
  } else {
    board.push({name:playerName, coins:coins});
  }

  board.sort((a,b)=> b.coins - a.coins);

  localStorage.setItem("leaderboard", JSON.stringify(board));

  render(board);
}

function render(board){
  let html = "";
  board.slice(0,5).forEach((p,i)=>{
    html += `<p>${i+1}. ${p.name} - 💰 ${p.coins}</p>`;
  });

  document.getElementById("board").innerHTML = html;
}

/* 📊 UI */
function updateUI(){
  document.getElementById("coins").innerText = coins;
  document.getElementById("level").innerText = level;
  updateRange();
}

/* 🌌 نجوم */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<120;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    speed: Math.random()*1+0.2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";

  for(let s of stars){
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();

    s.y += s.speed;

    if(s.y > canvas.height){
      s.y = 0;
      s.x = Math.random()*canvas.width;
    }
  }

  requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
