<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pekora Shop</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'MedievalSharp', cursive;
  text-align:center;
  color:white;
  background: radial-gradient(circle at top, #2b0a3d, #0f3d2e);

  overflow-x:hidden;
  overflow-y:auto;
}

/* 🌌 نجوم */
#stars{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* 🧱 بوكس */
.box{
  background:#18181b;
  width:360px;
  margin:auto;
  margin-top:30px;
  padding:20px;
  border-radius:12px;
  border:1px solid #2a2a2d;
}

/* 📱 موبايل */
@media (max-width:600px){
  .box{
    width:92%;
    padding:15px;
  }

  button{
    width:100%;
  }
}

/* 🔘 أزرار */
button{
  padding:10px;
  margin:6px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.blue{background:#2d8cff;color:white;}
.green{background:#00ff88;color:black;}
.purple{background:#9146ff;color:white;}

/* 💥 تأثير */
@keyframes pop{
  0%{transform:scale(0.8);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}

.box{
  animation:pop 0.4s ease;
}

a{
  text-decoration:none;
  color:white;
}

footer{
  position:fixed;
  bottom:0;
  width:100%;
  font-size:12px;
  color:#aaa;
  background:#0e0e10;
  padding:8px;
}

</style>
</head>

<body>

<!-- 🌌 نجوم -->
<canvas id="stars"></canvas>

<h1>🛒 Pekora Shop</h1>

<div class="box">

  <p>💰 Coins: <span id="coins">0</span></p>

  <h3>🎁 العناصر</h3>

  <button class="blue" onclick="buy(3,'💡 تلميح إضافي')">
    💡 تلميح إضافي - 3 coins
  </button>

  <button class="green" onclick="buy(5,'❤️ حياة')">
    ❤️ حياة - 5 coins
  </button>

  <button class="purple" onclick="buy(10,'🎯 كشف رقم')">
    🎯 كشف رقم - 10 coins
  </button>

  <hr>

  <a href="index.html">
    <button class="blue">⬅ رجوع للعبة</button>
  </a>

</div>

<footer>
©️ 2026 Pekora Shop - aziz/sptmbr
</footer>

<script>

/* 💰 عملات */
let coins = parseInt(localStorage.getItem("coins")) || 0;
document.getElementById("coins").innerText = coins;

/* 🛒 شراء */
function buy(cost,item){

  if(coins >= cost){
    coins -= cost;
    localStorage.setItem("coins", coins);

    alert("تم شراء: " + item + " ✅");
    document.getElementById("coins").innerText = coins;

  } else {
    alert("❌ ما عندك عملات كفاية");
  }
}

/* 🌌 نجوم */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<100;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    speed: Math.random()*1+0.2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";

  for(let s of stars){
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();

    s.y += s.speed;

    if(s.y > canvas.height){
      s.y = 0;
      s.x = Math.random()*canvas.width;
    }
  }

  requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
