<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leaderboard - Pekora</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'MedievalSharp', cursive;
  text-align:center;
  color:white;
  background: radial-gradient(circle at top, #2b0a3d, #0f3d2e);

  overflow-x:hidden;
  overflow-y:auto;
}

/* 🌌 نجوم */
#stars{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* 🧱 صندوق */
.box{
  background:#18181b;
  width:360px;
  margin:auto;
  margin-top:30px;
  padding:20px;
  border-radius:12px;
  border:1px solid #2a2a2d;
  animation:pop 0.4s ease;
}

/* 📱 موبايل */
@media (max-width:600px){
  .box{
    width:92%;
    padding:15px;
  }
}

/* 💥 pop */
@keyframes pop{
  0%{transform:scale(0.8);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}

h1{
  margin-top:25px;
  color:#9146ff;
  text-shadow:0 0 10px #9146ff;
}

.entry{
  background:#0e0e10;
  margin:8px 0;
  padding:10px;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
}

button{
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  width:100%;
}

.blue{background:#2d8cff;color:white;}

footer{
  position:fixed;
  bottom:0;
  width:100%;
  font-size:12px;
  color:#aaa;
  background:#0e0e10;
  padding:8px;
}

</style>
</head>

<body>

<!-- 🌌 نجوم -->
<canvas id="stars"></canvas>

<h1>🏆 Leaderboard</h1>

<div class="box">

  <h3>🔥 Top Players</h3>
  <div id="board"></div>

  <a href="index.html">
    <button class="blue">⬅ رجوع للعبة</button>
  </a>

</div>

<footer>
©️ 2026 Pekora Leaderboard - aziz/sptmbr
</footer>

<script>

/* 🏆 جلب البيانات */
let board = JSON.parse(localStorage.getItem("leaderboard")) || [];

/* ترتيب */
board.sort((a,b)=> b.coins - a.coins);

/* عرض */
function render(){

  let html = "";

  if(board.length === 0){
    html = "<p>لا يوجد لاعبين بعد</p>";
  }

  board.slice(0,10).forEach((p,i)=>{
    html += `
      <div class="entry">
        <span>${i+1}. ${p.name}</span>
        <span>💰 ${p.coins}</span>
      </div>
    `;
  });

  document.getElementById("board").innerHTML = html;
}

render();

/* 🌌 نجوم */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<100;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    speed: Math.random()*1+0.2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";

  for(let s of stars){
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();

    s.y += s.speed;

    if(s.y > canvas.height){
      s.y = 0;
      s.x = Math.random()*canvas.width;
    }
  }

  requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
